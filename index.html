<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Project | CauseRuDi Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dropdown-menu { display: none; position: absolute; right: 0; top: 100%; z-index: 50; width: 140px; }
        .dropdown-menu.active { display: block; }
        .gradient-text { background: linear-gradient(to right, #60a5fa, #2dd4bf); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-6 md:p-12 min-h-screen">
    <nav class="flex justify-between items-center mb-12">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">TEAM <span class="gradient-text">PROJECT</span></h1>
            <p class="text-[10px] tracking-[0.3em] text-gray-500 font-bold">RESOURCE HUB</p>
        </div>
        <button onclick="document.getElementById('m').classList.remove('hidden')" class="bg-blue-600 px-6 py-2.5 rounded-xl font-bold hover:scale-105 transition shadow-lg shadow-blue-500/20">+ Add New</button>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Explorer -->
        <div class="lg:col-span-2 glass rounded-[2.5rem] p-8">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="folder-kanban" class="text-blue-400"></i> Project Files</h2>
            <div id="fileList" class="space-y-3">
                <p class="text-gray-500 animate-pulse">Syncing with GitHub...</p>
            </div>
        </div>

        <!-- Details -->
        <div class="glass rounded-[2.5rem] p-8 h-fit">
            <h3 class="text-gray-500 text-xs font-bold mb-4 uppercase tracking-widest">Workspace Status</h3>
            <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
                <p class="text-sm text-gray-400 mb-2">Use the <b class="text-white">Modify</b> option in the 3-dot menu to replace an existing file with a newer version.</p>
                <div class="flex items-center gap-2 text-xs text-green-400"><span class="w-2 h-2 bg-green-400 rounded-full animate-ping"></span> Live GitHub Sync</div>
            </div>
        </div>
    </div>

    <!-- Upload/Modify Modal -->
    <div id="m" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-50 backdrop-blur-md">
        <div class="glass p-10 rounded-[2.5rem] max-w-sm w-full relative">
            <button onclick="document.getElementById('m').classList.add('hidden')" class="absolute top-8 right-8 text-gray-400"><i data-lucide="x"></i></button>
            <h2 id="modalTitle" class="text-2xl font-bold mb-6">Upload File</h2>
            <input type="file" id="fi" class="block w-full text-sm text-gray-400 file:bg-blue-600 file:text-white file:px-6 file:py-2.5 file:rounded-xl file:border-0 mb-8">
            <button id="ub" class="w-full bg-white text-black py-4 rounded-xl font-black uppercase tracking-widest hover:bg-blue-400 transition">Push to Cloud</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let currentFiles = [];

        async function load() {
            try {
                const r = await fetch('/api/manage');
                currentFiles = await r.json();
                const list = document.getElementById('fileList');
                list.innerHTML = currentFiles.length ? '' : 'Vault is empty.';
                
                currentFiles.forEach((f, i) => {
                    if(f.name === '.gitkeep') return;
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center p-5 glass rounded-2xl border border-white/5 relative group";
                    div.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-blue-500/10 rounded-xl"><i data-lucide="file-text" class="text-blue-400 w-5 h-5"></i></div>
                            <div><p class="text-sm font-bold">${f.name}</p><p class="text-[10px] text-gray-500 uppercase">${(f.size/1024).toFixed(1)} KB</p></div>
                        </div>
                        <div class="relative">
                            <button onclick="toggleMenu(event, ${i})" class="p-2 hover:bg-white/10 rounded-lg transition"><i data-lucide="more-vertical" class="w-5 h-5"></i></button>
                            <div id="menu-${i}" class="dropdown-menu glass p-2 rounded-xl border border-white/10 shadow-2xl">
                                <button onclick="window.open('${f.download_url}')" class="w-full text-left px-3 py-2 text-xs hover:bg-blue-500/20 rounded-lg flex items-center gap-2"><i data-lucide="download" class="w-3"></i> Download</button>
                                <button onclick="triggerModify()" class="w-full text-left px-3 py-2 text-xs hover:bg-yellow-500/20 rounded-lg flex items-center gap-2"><i data-lucide="edit-3" class="w-3"></i> Modify</button>
                                <button onclick="del('${f.name}','${f.sha}')" class="w-full text-left px-3 py-2 text-xs hover:bg-red-500/20 text-red-400 rounded-lg flex items-center gap-2"><i data-lucide="trash-2" class="w-3"></i> Delete</button>
                            </div>
                        </div>`;
                    list.appendChild(div);
                });
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        function toggleMenu(e, id) {
            e.stopPropagation();
            document.querySelectorAll('.dropdown-menu').forEach(m => m.id !== `menu-${id}` && m.classList.remove('active'));
            document.getElementById(`menu-${id}`).classList.toggle('active');
        }

        window.onclick = () => document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active'));

        function triggerModify() {
            document.getElementById('modalTitle').innerText = "Modify / Update File";
            document.getElementById('m').classList.remove('hidden');
        }

        document.getElementById('ub').onclick = async () => {
            const f = document.getElementById('fi').files[0];
            if(!f) return;
            const b = document.getElementById('ub');
            b.innerText = "Processing..."; b.disabled = true;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const content = e.target.result.split(',')[1];
                await fetch('/api/manage', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ fileName: f.name, content })
                });
                location.reload();
            };
            reader.readAsDataURL(f);
        };

        async function del(n, s) {
            if(confirm(`Delete ${n}?`)) {
                await fetch(`/api/manage?file=${n}&sha=${s}`, { method: 'DELETE' });
                load();
            }
        }
        load();
    </script>
</body>
</html>
