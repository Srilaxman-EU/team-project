<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mani Team | CauseRuDi Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-btn { background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); transition: 0.3s; }
        .gradient-btn:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body class="p-8">
    <!-- Header -->
    <nav class="flex justify-between items-center mb-12">
        <h1 class="text-3xl font-black italic uppercase">Mani <span class="text-blue-400">Team</span></h1>
        <button onclick="toggleModal()" class="gradient-btn px-6 py-2 rounded-full font-bold text-black flex items-center gap-2">
            <i data-lucide="upload-cloud"></i> Upload File
        </button>
    </nav>

    <!-- Dashboard Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-2 glass p-8 rounded-3xl">
            <h2 class="text-xl font-bold mb-4">Project Resources</h2>
            <div class="space-y-4">
                <a href="files/paper.pdf" class="flex justify-between items-center p-4 bg-white/5 rounded-2xl hover:bg-white/10 transition">
                    <div class="flex items-center gap-4"><i data-lucide="file-text" class="text-blue-400"></i> IEEE Paper</div>
                    <i data-lucide="download"></i>
                </a>
                <a href="files/presentation.pptx" class="flex justify-between items-center p-4 bg-white/5 rounded-2xl hover:bg-white/10 transition">
                    <div class="flex items-center gap-4"><i data-lucide="presentation" class="text-purple-400"></i> Project PPT</div>
                    <i data-lucide="download"></i>
                </a>
            </div>
        </div>
        
        <div class="glass p-8 rounded-3xl flex flex-col items-center justify-center text-center">
            <div class="w-16 h-16 bg-blue-500/20 rounded-full flex items-center justify-center mb-4"><i data-lucide="users" class="text-blue-400"></i></div>
            <h3 class="font-bold">Team Mani</h3>
            <p class="text-gray-500 text-sm">Active Collaborators: 5</p>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center z-50 p-4">
        <div class="glass w-full max-w-md p-8 rounded-3xl">
            <div class="flex justify-between mb-6">
                <h2 class="text-xl font-bold">Upload to GitHub</h2>
                <button onclick="toggleModal()"><i data-lucide="x"></i></button>
            </div>
            <input type="file" id="fileInput" class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-500/10 file:text-blue-400 hover:file:bg-blue-500/20 mb-6">
            <button id="uploadBtn" class="w-full gradient-btn py-3 rounded-2xl font-bold text-black">Start Upload</button>
            <p id="status" class="mt-4 text-center text-sm"></p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function toggleModal() { document.getElementById('uploadModal').classList.toggle('hidden'); }

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const status = document.getElementById('status');
            if (!fileInput.files[0]) return alert("Select a file first!");

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            status.innerText = "Processing...";
            
            reader.onload = async (e) => {
                const base64Content = e.target.result.split(',')[1];
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fileName: file.name,
                        content: base64Content
                    })
                });

                if (response.ok) {
                    status.innerText = "✅ Successfully added to GitHub!";
                    setTimeout(() => location.reload(), 2000);
                } else {
                    status.innerText = "❌ Upload failed.";
                }
            };
            reader.readAsDataURL(file);
        });
    </script>
</body>
</html>
