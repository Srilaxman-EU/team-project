<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Project Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dropdown { display: none; position: absolute; right: 0; top: 100%; z-index: 100; width: 160px; }
        .dropdown.active { display: block; }
        .file-row { transition: 0.2s; cursor: pointer; user-select: none; }
        .file-row:hover { background: rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen">
    <nav class="flex justify-between items-center mb-10">
        <h1 class="text-2xl font-extrabold tracking-tighter uppercase">Team <span class="text-blue-500">Project</span></h1>
        <button onclick="openModal()" class="bg-blue-600 px-6 py-2 rounded-xl font-bold shadow-lg hover:bg-blue-500 transition">+ Upload</button>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- File Explorer -->
        <div class="lg:col-span-2 glass rounded-[2rem] p-6">
            <h2 class="text-lg font-bold mb-4 opacity-70">Double-click a file to view it</h2>
            <div id="fileList" class="space-y-2">
                <p class="text-gray-500">Syncing repository...</p>
            </div>
        </div>

        <!-- Help Sidebar -->
        <div class="glass rounded-[2rem] p-6 h-fit">
            <h3 class="font-bold mb-4">Quick Guide</h3>
            <ul class="text-sm text-gray-400 space-y-3">
                <li class="flex items-center gap-2"><i data-lucide="mouse-pointer-2" class="w-4"></i> Double-click to open file</li>
                <li class="flex items-center gap-2"><i data-lucide="edit-3" class="w-4"></i> "Modify" replaces existing file</li>
                <li class="flex items-center gap-2"><i data-lucide="trash-2" class="w-4"></i> "Delete" is permanent</li>
            </ul>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="modal" class="fixed inset-0 bg-black/90 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="glass w-full max-w-sm p-8 rounded-[2rem] relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white"><i data-lucide="x"></i></button>
            <h2 id="mTitle" class="text-xl font-bold mb-6">Sync New Resource</h2>
            <input type="file" id="fi" class="block w-full text-sm text-gray-400 file:bg-blue-600 file:text-white file:px-4 file:py-2 file:rounded-lg file:border-0 mb-6">
            <button id="ub" class="w-full bg-white text-black py-3 rounded-xl font-bold hover:bg-blue-400 transition">Push to GitHub</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let filesData = [];

        async function fetchFiles() {
            try {
                const r = await fetch('/api/manage');
                filesData = await r.json();
                const list = document.getElementById('fileList');
                list.innerHTML = filesData.length ? '' : '<div class="text-center py-10 opacity-30">Folder is empty</div>';

                filesData.forEach((f, i) => {
                    if (f.name === '.gitkeep') return;
                    const div = document.createElement('div');
                    div.className = "file-row flex justify-between items-center p-4 glass rounded-xl border-transparent border relative";
                    // Double click listener added here
                    div.ondblclick = () => window.open(f.download_url, '_blank');
                    
                    div.innerHTML = `
                        <div class="flex items-center gap-4">
                            <i data-lucide="file-text" class="text-blue-400 w-5 h-5"></i>
                            <span class="text-sm font-semibold truncate max-w-[150px] md:max-w-xs">${f.name}</span>
                        </div>
                        <div class="relative">
                            <button onclick="toggleMenu(event, ${i})" class="p-2 hover:bg-white/10 rounded-lg"><i data-lucide="more-vertical" class="w-5"></i></button>
                            <div id="menu-${i}" class="dropdown glass p-2 rounded-xl shadow-2xl border-white/20">
                                <button onclick="window.open('${f.download_url}')" class="w-full text-left p-2 text-xs hover:bg-blue-500/20 rounded-lg flex gap-2"><i data-lucide="download" class="w-3"></i> Open/Download</button>
                                <button onclick="openModal('Modify')" class="w-full text-left p-2 text-xs hover:bg-yellow-500/20 rounded-lg flex gap-2"><i data-lucide="edit-3" class="w-3"></i> Modify</button>
                                <button onclick="deleteAction('${f.name}', '${f.sha}')" class="w-full text-left p-2 text-xs hover:bg-red-500/20 text-red-400 rounded-lg flex gap-2"><i data-lucide="trash-2" class="w-3"></i> Delete</button>
                            </div>
                        </div>`;
                    list.appendChild(div);
                });
                lucide.createIcons();
            } catch (e) { console.error("Sync Error", e); }
        }

        function toggleMenu(e, id) {
            e.stopPropagation();
            document.querySelectorAll('.dropdown').forEach(m => m.id !== `menu-${id}` && m.classList.remove('active'));
            document.getElementById(`menu-${id}`).classList.toggle('active');
        }

        window.onclick = () => document.querySelectorAll('.dropdown').forEach(m => m.classList.remove('active'));

        function openModal(mode = 'Upload') {
            document.getElementById('mTitle').innerText = mode === 'Modify' ? 'Update Existing File' : 'Sync New Resource';
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        document.getElementById('ub').onclick = async () => {
            const file = document.getElementById('fi').files[0];
            if (!file) return;
            const btn = document.getElementById('ub');
            btn.innerText = "Processing..."; btn.disabled = true;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const content = e.target.result.split(',')[1];
                const res = await fetch('/api/manage', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ fileName: file.name, content })
                });
                if (res.ok) location.reload(); else alert("Error uploading file.");
            };
            reader.readAsDataURL(file);
        };

        async function deleteAction(name, sha) {
            if (!confirm(`Delete ${name} forever?`)) return;
            const res = await fetch(`/api/manage?file=${name}&sha=${sha}`, { method: 'DELETE' });
            if (res.ok) fetchFiles(); else alert("Delete failed. Check GitHub Token permissions.");
        }

        fetchFiles();
    </script>
</body>
</html>
